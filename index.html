<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="refresh" content="6;url=https://69c57dcf088bfd14a21fc9d7--megastore1023.netlify.app/">
<title>Mega Store | تم نقل الموقع</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 576 512'%3E%3Cpath fill='%236366f1' d='M0 24C0 10.7 10.7 0 24 0H69.5c22 0 41.5 12.8 50.6 32h411c26.3 0 45.5 25 38.6 50.4l-41 152.3c-8.5 31.4-37 53.3-69.5 53.3H170.7l5.4 28.5c2.2 11.3 12.1 19.5 23.6 19.5H488c13.3 0 24 10.7 24 24s-10.7 24-24 24H199.7c-34.6 0-64.3-24.6-70.7-58.5L77.4 54.5c-.7-3.8-4-6.5-7.9-6.5H24C10.7 48 0 37.3 0 24zM128 464a48 48 0 1 1 96 0 48 48 0 1 1 -96 0zm336-48a48 48 0 1 1 0 96 48 48 0 1 1 0-96z'/%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
  --primary: #6366f1;
  --primary-dark: #4f46e5;
  --primary-light: rgba(99,102,241,0.12);
  --accent: #f59e0b;
  --success: #10b981;
  --bg: #0a0e1a;
  --bg-card: #111827;
  --bg-card2: #1a2235;
  --text: #f1f5f9;
  --text-muted: #94a3b8;
  --border: rgba(255,255,255,0.07);
  --radius: 16px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Tajawal', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
  opacity: 0.4;
}

/* ─── NAVBAR ─── */
.navbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  padding: 16px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(10,14,26,0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}
.nav-brand {
  font-size: 22px;
  font-weight: 900;
  background: linear-gradient(135deg, var(--primary), #a855f7, var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: -0.5px;
  display: flex;
  align-items: center;
  gap: 8px;
}

/* ─── GLOW BLOBS ─── */
.blob {
  position: fixed;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.12;
  pointer-events: none;
  z-index: 0;
  animation: blobFloat 8s ease-in-out infinite alternate;
}
.blob-1 { width: 400px; height: 400px; background: var(--primary); top: -100px; right: -100px; }
.blob-2 { width: 300px; height: 300px; background: #a855f7; bottom: -80px; left: -80px; animation-delay: -3s; }
@keyframes blobFloat { from { transform: translateY(0) scale(1); } to { transform: translateY(30px) scale(1.05); } }

/* ─── MAIN ─── */
main {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 100px 20px 40px;
  position: relative;
  z-index: 1;
}

.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 28px;
  padding: 44px 28px;
  max-width: 420px;
  width: 100%;
  text-align: center;
  box-shadow: 0 32px 80px rgba(0,0,0,0.4), 0 0 0 1px rgba(99,102,241,0.08);
  animation: cardIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
}
@media (max-width: 480px) {
  .card { padding: 36px 20px; border-radius: 22px; }
  .title { font-size: 21px; }
  .subtitle { font-size: 14px; }
  .countdown-wrap { width: 96px; height: 96px; }
  .countdown-num { font-size: 30px; }
  .btn-redirect { font-size: 15px; padding: 13px 20px; }
}
@keyframes cardIn { from { opacity:0; transform: scale(0.92) translateY(20px); } to { opacity:1; transform: scale(1) translateY(0); } }

.icon-wrap {
  width: 80px; height: 80px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), #a855f7);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 24px;
  font-size: 30px;
  color: white;
  box-shadow: 0 0 40px rgba(99,102,241,0.35);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100% { box-shadow: 0 0 30px rgba(99,102,241,0.3); } 50% { box-shadow: 0 0 55px rgba(99,102,241,0.6); } }

.title {
  font-size: 24px;
  font-weight: 900;
  margin-bottom: 10px;
  background: linear-gradient(135deg, var(--text), #a5b4fc);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.subtitle {
  font-size: 15px;
  color: var(--text-muted);
  line-height: 1.7;
  margin-bottom: 36px;
}
.subtitle span {
  color: var(--primary);
  font-weight: 700;
}

/* ─── COUNTDOWN RING ─── */
.countdown-wrap {
  position: relative;
  width: 110px; height: 110px;
  margin: 0 auto 32px;
}
.countdown-ring {
  transform: rotate(-90deg);
  position: absolute;
  inset: 0;
}
.ring-bg { fill: none; stroke: var(--bg-card2); stroke-width: 6; }
.ring-fill {
  fill: none;
  stroke: url(#ringGrad);
  stroke-width: 6;
  stroke-linecap: round;
  stroke-dasharray: 283;
  stroke-dashoffset: 0;
  transition: stroke-dashoffset 1s linear;
}
.countdown-num {
  position: absolute;
  inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  font-size: 36px;
  font-weight: 900;
  background: linear-gradient(135deg, var(--primary), #a855f7);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1;
}
.countdown-num small { font-size: 12px; font-weight: 700; color: var(--text-muted); -webkit-text-fill-color: var(--text-muted); margin-top: 2px; }

/* ─── PROGRESS BAR ─── */
.progress-track {
  background: var(--bg-card2);
  border-radius: 99px;
  height: 6px;
  margin-bottom: 28px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  border-radius: 99px;
  background: linear-gradient(90deg, var(--primary), #a855f7);
  width: 100%;
  transition: width 1s linear;
}

.btn-redirect {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: white;
  font-family: 'Tajawal', sans-serif;
  font-size: 16px;
  font-weight: 700;
  padding: 14px 28px;
  border-radius: 14px;
  border: none;
  cursor: pointer;
  text-decoration: none;
  box-shadow: 0 8px 24px rgba(99,102,241,0.3);
  transition: transform 0.2s, box-shadow 0.2s;
  width: 100%;
  justify-content: center;
}
.btn-redirect:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(99,102,241,0.45); }
.btn-redirect:active { transform: translateY(0); }
</style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<nav class="navbar">
  <div class="nav-brand">
    <i class="fas fa-store"></i>
    Mega Store
  </div>
</nav>

<main>
  <div class="card">
    <div class="icon-wrap"><i class="fas fa-location-arrow"></i></div>
    <div class="title">تم نقل الموقع!</div>
    <div class="subtitle">
      انتقلنا لرابط جديد لنقدم لك تجربة أفضل.<br>
      سيتم نقلك تلقائياً خلال <span id="secText">6</span> ثوانٍ.
    </div>

    <div class="countdown-wrap">
      <svg class="countdown-ring" viewBox="0 0 100 100">
        <defs>
          <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#6366f1"/>
            <stop offset="100%" stop-color="#a855f7"/>
          </linearGradient>
        </defs>
        <circle class="ring-bg" cx="50" cy="50" r="45"/>
        <circle class="ring-fill" id="ringFill" cx="50" cy="50" r="45"/>
      </svg>
      <div class="countdown-num">
        <span id="countNum">6</span>
        <small>ثانية</small>
      </div>
    </div>

    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>

    <a class="btn-redirect" href="https://69c57dcf088bfd14a21fc9d7--megastore1023.netlify.app/">
      <i class="fas fa-arrow-left"></i>
      انتقل الآن
    </a>
  </div>
</main>

<script>
const TOTAL = 6;
const circumference = 2 * Math.PI * 45; // ≈ 283
let remaining = TOTAL;

const ringFill = document.getElementById('ringFill');
const countNum = document.getElementById('countNum');
const secText  = document.getElementById('secText');
const progressFill = document.getElementById('progressFill');

ringFill.style.strokeDasharray = circumference;
ringFill.style.strokeDashoffset = 0;

function tick() {
  remaining--;
  countNum.textContent = remaining;
  secText.textContent  = remaining;

  const ratio = remaining / TOTAL;
  ringFill.style.strokeDashoffset = circumference * (1 - ratio);
  progressFill.style.width = (ratio * 100) + '%';

  if (remaining <= 0) {
    window.location.href = 'https://69c57dcf088bfd14a21fc9d7--megastore1023.netlify.app/';
  }
}

// ابدأ بعد ثانية
setTimeout(() => {
  tick();
  setInterval(tick, 1000);
}, 1000);
</script>
</body>
</html>
